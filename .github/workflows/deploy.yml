name: Deploy to GitHub Pages

on:
  push:
    branches: ["build"] # Altere se sua branch principal tiver outro nome

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build # Certifique-se de que este comando gera uma pasta (ex: dist ou build)

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # IMPORTANTE: coloque aqui a pasta gerada pelo seu build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
