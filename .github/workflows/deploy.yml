name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Create static index.html
        run: |
          JS=$(ls dist/client/assets/*.js | grep -v 'index-' | head -1 || ls dist/client/assets/index-*.js | head -1)
          JS=$(basename $JS)
          CSS=$(basename $(ls dist/client/assets/*.css | head -1))
          cat > dist/client/index.html << EOF
          <!DOCTYPE html>
          <html lang="en">
            <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>Checklist Makeover</title>
              <link rel="stylesheet" href="/checklist-makeover/assets/$CSS" />
            </head>
            <body>
              <div id="root"></div>
              <script type="module" src="/checklist-makeover/assets/$JS"></script>
            </body>
          </html>
          EOF
          cp dist/client/index.html dist/client/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist/client'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
